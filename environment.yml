# ============================================================
# MEI-New 项目环境配置文件
# 架构: ~33万参数 / 多重模糊 / 圆形感受野
# 生成日期: 2026-03-08
# ============================================================

name: chatgpt
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ====================
  # Python 核心
  # ====================
  - python=3.10

  # ====================
  # 深度学习框架 (GPU 加速)
  # ====================
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8

  # ====================
  # 科学计算与数据处理
  # ====================
  - numpy
  - scipy
  - h5py
  - pandas
  - openpyxl              # Excel 导出支持

  # ====================
  # 可视化
  # ====================
  - matplotlib

  # ====================
  # 开发工具
  # ====================
  - ipython
  - pip

  # ====================
  # Pip 专用库
  # ====================
  - pip:
    - swanlab             # 实验追踪平台

# ============================================================
# 使用说明:
# ============================================================
# 1. 创建环境:
#    conda env create -f environment.yml
#
# 2. 激活环境:
#    conda activate chatgpt
#
# 3. 验证 GPU 支持:
#    python -c "import torch; print(f'CUDA: {torch.cuda.is_available()}')"
#
# 4. 如果 CUDA 版本不匹配，可调整 pytorch-cuda 版本:
#    - RTX 30/40 系列: pytorch-cuda=11.8 或 12.1
#    - GTX 10/20 系列: pytorch-cuda=11.7 或 11.8
#
# 5. 如果安装失败，可尝试分步安装:
#    conda install pytorch torchvision torchaudio pytorch-cuda=11.8 -c pytorch -c nvidia
#    pip install swanlab
#
# ============================================================
